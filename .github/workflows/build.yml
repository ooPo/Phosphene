name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install sdl3 libsoxr pkg-config

      - name: Print build configuration
        run: make info

      - name: Build
        run: make
